<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Carousel</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body>
    <div class="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Slide 1" />
        </div>
        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?w=800" alt="Slide 2" />
        </div>
        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800" alt="Slide 3" />
        </div>
        <div class="carousel-item">
          <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800" alt="Slide 4" />
        </div>
      </div>
      <button class="btn prev"><i class="fas fa-chevron-left"></i></button>
      <button class="btn next"><i class="fas fa-chevron-right"></i></button>
      <div class="dots"></div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
