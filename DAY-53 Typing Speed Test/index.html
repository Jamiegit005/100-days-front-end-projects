<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Speed Test</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h2>Typing Speed Test</h2>

      <div id="stats">
        <div class="stat">
          <span id="timer">60</span>
          <small>Seconds</small>
        </div>
        <div class="stat">
          <span id="wpm">0</span>
          <small>WPM</small>
        </div>
        <div class="stat">
          <span id="accuracy">100</span>
          <small>Accuracy %</small>
        </div>
      </div>

      <div id="quote-box">
        <p id="quote"></p>
      </div>

      <textarea id="input" placeholder="Start typing to begin the test..." spellcheck="false"></textarea>

      <button id="restart">Restart 🔄</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
