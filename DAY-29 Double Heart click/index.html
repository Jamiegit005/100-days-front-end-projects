<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Double Click Heart</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <h2>Double click on the image to <i class="fas fa-heart"></i> it</h2>

    <div class="container">
      <img
        src="https://images.unsplash.com/photo-1504215680853-026ed2a45def?w=600"
        alt="A beautiful photo"
      />
      <i class="fas fa-heart"></i>
    </div>
    <p id="likes-count"><i class="fas fa-heart"></i> <span>0</span> likes</p>

    <script src="index.js"></script>
  </body>
</html>
